<!DOCTYPE html>
<html>
  <head displayType="portrait">
    <base target="_top">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="../src/style.css" rel="stylesheet">
    <link href="../src/portrait.css" rel="stylesheet">
    <link href="../images/icon.ico" rel="icon">

    <title>FRC Rebuilt Scouting</title>
    <meta name="description" content="Scouting interface for the 2025/26 FRC Season">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <div class="inset"></div>
    <div id="interact">
      <div class="outerbox">
        <h2 style="margin: 0px;">2025/26 FRC Rebuilt Scouting</h2>
      </div>
      <div id="floating">
        <div id="header" class="area">
          <div class="statBox">
            <h2 style="margin: 0px;">Team</h2>
            <input list="team-options" id="team" type="text" placeholder="Team #" class="baseInput" onchange="updateTeamList()" autocomplete="team">
            <datalist id="team-options"></datalist>
          </div>
          <div class="statBox" title="Found in the url of the competition link at www.thebluealliance/...">
            <h2 style="margin: 0px;">Comp. ID</h2>
            <input list="comp-options" id="comp" type="text" placeholder="N/A" class="baseInput" onchange="updateTeamList()" autocomplete="comp">
            <datalist id="comp-options"></datalist>
          </div>
          <div class="statBox">
            <h2 style="margin: 0px;">Match</h2>
            <input id="match" type="text" placeholder="Match #" class="baseInput" onchange="updateTeamList()">
          </div>
        </div>
        <div id="autoTitle" class="area">
          <div class="statBox labelBox"><h2 style="margin: 0px;">Auto</h2></div>
        </div>
        <div id="auto" class="area">
          <div class="statBox">
            <h2>Methods</h1>
              <div class="input">
                <select id="methodsAuto">
                  <option value="None">N/A</option>
                  <option value="Hub">Hub Only</option>
                  <option value="Outpost">Outpost Only</option>
                  <option value="Both">Both</option>
                </select>
              </div>
          </div>
          <div class="statBox">
            <h2>Consistency</h1>
              <div class="input">
                <select id="consistencyAuto">
                  <option value="0">0 - Didn't Attempt</option>
                  <option value="0.25">1 - Frequently Missed</option>
                  <option value="0.5">2 - Every Other Shot</option>
                  <option value="0.25">3 - Frequently Scored</option>
                  <option value="1">4 - Didn't Miss</option>
                </select>
              </div>
          </div>
          <div class="statBox">
            <h2>Climb</h1>
              <div class="input">
                <select id="climbAuto">
                  <option value="0">N/A</option>
                  <option value="1.1">L1 - Left</option>
                  <option value="1.2">L1 - Middle</option>
                  <option value="1.3">L1 - Right</option>
                </select>
              </div>
          </div>
        </div>
        <div id="teleopTitle" class="area">
          <div class="statBox labelBox"><h2 style="margin: 0px;">Teleop</h2></div>
        </div>
        <div id="teleop" class="area">
          <div class="statBox">
            <h2>Methods</h1>
              <div class="input">
                <select id="methodsTele">
                  <option value="None">N/A</option>
                  <option value="Hub">Hub Only</option>
                  <option value="Outpost">Outpost Only</option>
                  <option value="Both">Both</option>
                </select>
              </div>
          </div>
          <div class="statBox">
            <h2>Consistency</h1>
              <div class="input">
                <select id="consistencyTele">
                  <option value="0">0 - Didn't Attempt</option>
                  <option value="0.25">1 - Frequently Missed</option>
                  <option value="0.5">2 - Every Other Shot</option>
                  <option value="0.25">3 - Frequently Scored</option>
                  <option value="1">4 - Didn't Miss</option>
                </select>
              </div>
          </div>
          <div class="statBox">
            <h2>Climb</h1>
            <div class="input">
              <select id="climbTele">
                <option value="0">N/A</option>
                <option value="1.1">L1 - Left</option>
                <option value="1.2">L1 - Middle</option>
                <option value="1.3">L1 - Right</option>
                <option value="2.1">L2 - Left</option>
                <option value="2.2">L2 - Middle</option>
                <option value="2.3">L2 - Right</option>
                <option value="3.1">L3 - Left</option>
                <option value="3.2">L3 - Middle</option>
                <option value="3.3">L3 - Right</option>
              </select>
            </div>
          </div>
        </div>
        <div class="area">
          <textarea id="notes" placeholder="Additional notes on performance. Include information on play style, scoring, fouls, intake playstyle, etc..."></textarea>
        </div>
      </div>
      <button id="submit" onclick="appendData()">Submit</button>
      <button id="download" onclick="download()">Download</button>
    </div>
    <div class="inset"></div>
  </body>
  <script src="../src/main.js"></script>
</html>
